<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Apple App Store and Google Play Store send real-time S2S notifications to the Purchasely server, which normalizes the events and fans them out via a unified webhook to the optional client backend and third-party integrations like Batch and Amplitude.</desc>
